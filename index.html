<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="DevWar — Competitive learning tracker for developers. Log hours, earn XP, level up, and battle friends.">
    <title>DevWar — Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-brand animate-in">
                <h1>Dev<span>War</span></h1>
                <p>Track progress. Earn XP. Battle developers.</p>
            </div>

            <div class="auth-card animate-in animate-in-delay-1">
                <div class="auth-tabs">
                    <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Log In</button>
                    <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
                </div>

                <div class="auth-error" id="authError"></div>

                <!-- Login Form -->
                <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        Log In
                    </button>
                </form>

                <!-- Signup Form -->
                <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
                    <div class="input-group">
                        <label for="signupUsername">Username</label>
                        <input type="text" id="signupUsername" placeholder="devgod99" required minlength="3"
                            maxlength="20">
                    </div>
                    <div class="input-group">
                        <label for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" placeholder="Min 6 characters" required
                            minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary" id="signupBtn">
                        Create Account
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
